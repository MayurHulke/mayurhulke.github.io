baseURL: "https://mayurhulke.github.io/"
locale: "en-gb"
title: "Mayur Hulke"
theme: "PaperMod"

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

pagination:
  pagerSize: 5

minify:
  disableXML: true
  minifyOutput: true

params:
  env: production
  description: "Mayur Hulke — Robotics Tech Lead at Deltia AI. Building the perception-to-action stack for industrial manipulation."
  author: "Mayur Hulke"
  DateFormat: "January 2, 2006"
  defaultTheme: auto
  disableThemeToggle: false

  ShowReadingTime: true
  ShowShareButtons: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: true
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  showtoc: false
  tocopen: false

  assets:
    disableHLJS: true

  # Header logo: short name + animated Rocky icon (Project Hail Mary). Acts as home button.
  label:
    text: "Mayur Hulke"
    icon: "img/icons/rocky.gif"
    iconHeight: 34

  # Home page profile-mode hero
  profileMode:
    enabled: true
    title: "Mayur Hulke"
    imageUrl: "img/profile/mayur.jpg"
    imageWidth: 380
    imageHeight: 380
    imageTitle: "Mayur Hulke"

  socialIcons:
    - name: github
      url: "https://github.com/mayurhulke"
    - name: linkedin
      url: "https://www.linkedin.com/in/mayurhulke/"
    - name: email
      url: "mailto:mayurhulke@gmail.com"
    - name: rss
      url: "/index.xml"

  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    limit: 10
    keys: ["title", "permalink", "summary", "content"]

outputs:
  home: ["HTML", "RSS", "JSON"]

menu:
  main:
    - identifier: experience
      name: Experience
      url: /experience/
      weight: 15
    - identifier: writing
      name: Writing
      url: /posts/
      weight: 20
    - identifier: tags
      name: Tags
      url: /tags/
      weight: 30

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false
    codeFences: true
    guessSyntax: true
    style: monokai
