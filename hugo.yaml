baseURL: "https://mayurhulke.github.io/"
locale: "en-gb"
title: "Mayur Hulke"
theme: "PaperMod"

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

pagination:
  pagerSize: 5

minify:
  disableXML: true
  minifyOutput: true

params:
  env: production
  description: "Mayur Hulke, Robotics Lead at Deltia AI. Building the physical-intelligence layer for industrial robots."
  author: "Mayur Hulke"
  DateFormat: "January 2, 2006"
  defaultTheme: auto
  disableThemeToggle: false

  ShowReadingTime: true
  ShowShareButtons: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: true
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  showtoc: false
  tocopen: false

  assets:
    disableHLJS: true

  # Header logo: short name + animated Rocky icon (Project Hail Mary). Acts as home button.
  label:
    text: "Amaze Amaze Amaze"
    icon: "img/icons/rocky.gif"
    iconHeight: 34

  # Home page profile-mode hero
  profileMode:
    enabled: true
    title: "Mayur Hulke"
    imageUrl: "img/profile/lab.jpg"
    imageWidth: 800
    imageHeight: 800
    imageTitle: "Mayur Hulke"

  socialIcons:
    - name: linkedin
      url: "https://www.linkedin.com/in/mayurhulke/"
    - name: x
      url: "https://x.com/LetstalkRobots"
    - name: youtube
      url: "https://www.youtube.com/@LetsTalkWithRobots"
    - name: instagram
      url: "https://www.instagram.com/themayurhulk/"

  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    limit: 10
    keys: ["title", "permalink", "summary", "content"]

outputs:
  home: ["HTML", "RSS", "JSON"]

menu:
  main:
    - identifier: experience
      name: My Journey
      url: /experience/
      weight: 15
    - identifier: notes
      name: My Notes
      url: "https://letstalkwithrobots.substack.com/?utm_campaign=profile_chips"
      weight: 20

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false
    codeFences: true
    guessSyntax: true
    style: monokai
